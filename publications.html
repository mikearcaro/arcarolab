<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publications — Arcaro Lab</title>
  <meta name="description" content="Journal publications and conference presentations from the Arcaro Lab."/>
  <link rel="icon" href="img/core-img/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script>(function(){var k='arcarolab-theme',s=localStorage.getItem(k),t=s||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <!-- Retro mode persistence: apply immediately to prevent flash -->
  <script>
    if (localStorage.getItem('retro_mode')) {
      document.documentElement.classList.add('retro-pending');
      var _rl = document.createElement('link');
      _rl.rel = 'stylesheet';
      _rl.href = 'https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap';
      document.head.appendChild(_rl);
    }
  </script>
</head>
<body data-page="publications" data-nav="Publications">
  <div id="toolbar"></div>
  <main>
    <div class="pub-page">

      <!-- Shared tab bar — identical structure on both "pages" -->
      <nav class="pub-tab-bar" aria-label="Publication sections">
        <button class="pub-tab-btn" data-tab="publications">Publications</button>
        <button class="pub-tab-btn" data-tab="conferences">Conference Presentations</button>
        <a class="pub-scholar-link" href="https://scholar.google.com/citations?user=07tNFdgAAAAJ&hl=en"
           target="_blank" rel="noopener noreferrer">Google Scholar &rarr;</a>
      </nav>

      <!-- Publications panel -->
      <div id="tab-publications">
        <section id="preprints">
          <div class="pub-group">
            <h2 class="pub-year">Preprints</h2>
            <ul class="pub-list" id="preprints-list"></ul>
          </div>
        </section>
        <section aria-label="Journal publications" id="publications-list"></section>
      </div>

      <!-- Conferences panel (hidden by default) -->
      <div id="tab-conferences" style="display:none">
        <section aria-label="Conference presentations" id="conferences-list"></section>
      </div>

    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/data.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
